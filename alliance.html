<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Strategic Portal</title>
    <style>
        :root {
            /* Neutral "Grey Market" Palette */
            --primary: #94a3b8;    /* Steel Blue/Grey */
            --accent: #64748b;     /* Slate */
            --bg: #0f172a;         /* Dark Space */
            --glass: rgba(30, 41, 59, 0.7);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            color: #e2e8f0;
            font-family: 'Courier New', monospace; /* More "Anonymous" feel */
            overflow: hidden;
        }

        /* TACTICAL GRID - Now Neutral */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0.4) 50%),
                linear-gradient(90deg, rgba(148, 163, 184, 0.05) 1px, transparent 1px);
            background-size: 100% 2px, 50px 50px;
            z-index: 1;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 2;
            position: relative;
        }

        /* NEUTRAL HEADER */
        .logo-container h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            margin: 0;
            letter-spacing: 20px;
            font-weight: 200; /* Thinner, more modern font */
            text-transform: uppercase;
            border-top: 1px solid var(--primary);
            border-bottom: 1px solid var(--primary);
            padding: 20px 0;
        }

        .tagline {
            color: var(--primary);
            letter-spacing: 10px;
            margin-top: 20px;
            font-size: 0.7rem;
        }

        /* ACTION BUTTONS */
        .actions { display: flex; gap: 15px; margin-top: 50px; }

        .btn {
            padding: 12px 30px;
            border: 1px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
            background: rgba(148, 163, 184, 0.05);
        }

        .btn:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(148, 163, 184, 0.3);
        }

        /* ANONYMOUS TICKER */
        .ticker-wrap {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid var(--accent);
            padding: 8px 0;
        }
        .ticker { display: flex; white-space: nowrap; animation: ticker 40s linear infinite; }
        .ticker-item { padding: 0 60px; color: var(--accent); font-size: 0.7rem; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="hero">
    <div class="logo-container">
        <h1>COALITION</h1>
        <p class="tagline">UNIFIED STRATEGIC INTERFACE</p>
    </div>

    <div class="actions">
        <a href="https://discord.gg/pdr2BM9f6r" class="btn">Establish Uplink</a>
        <a href="#" class="btn" onclick="alert('Accessing Central Database...')">Intelligence</a>
    </div>
</div>

<div class="ticker-wrap">
    <div class="ticker">
        <div class="ticker-item">:: NEUTRAL ZONE ESTABLISHED ::</div>
        <div class="ticker-item">:: ENCRYPTION PROTOCOL: ACTIVE ::</div>
        <div class="ticker-item">:: AWAITING FACTION INPUT ::</div>
        <div class="ticker-item">:: ALLIANCE JOURNALISM FEED: READY ::</div>
    </div>
</div>

</body>
</html>
