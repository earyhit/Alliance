<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coalition | Tactical Interface</title>
    <style>
        :root {
            --primary: #94a3b8;
            --accent: #10b981; /* Tactical Green */
            --bg: #020617;
            --glitch: #ef4444;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            color: #f1f5f9;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* RADAR CONTAINER */
        .radar-bg {
            position: fixed;
            top: 50%; left: 50%;
            width: 800px; height: 800px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        /* RADAR SWEEP LINE */
        .radar-sweep {
            position: absolute;
            top: 50%; left: 50%;
            width: 400px; height: 400px;
            background: conic-gradient(from 0deg, rgba(16, 185, 129, 0.2) 0%, transparent 25%);
            transform-origin: top left;
            animation: rotate 4s linear infinite;
        }

        /* PULSING RADAR BLIPS */
        .blip {
            position: absolute;
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: ping 4s ease-out infinite;
            opacity: 0;
        }

        /* SCAN LINES EFFECT */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @keyframes ping {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        /* PERSONNEL BADGE */
        .personnel-badge {
            position: fixed; top: 20px; right: 20px;
            padding: 10px 20px;
            border: 1px solid var(--accent);
            background: rgba(2, 6, 23, 0.9);
            font-size: 0.7rem;
            letter-spacing: 2px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        #member-count { color: var(--accent); font-weight: bold; }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: clamp(2.5rem, 12vw, 6rem);
            margin: 0;
            letter-spacing: 15px;
            text-transform: uppercase;
            border-top: 1px solid var(--primary);
            border-bottom: 1px solid var(--primary);
            padding: 25px 0;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 200;
        }

        .btn {
            margin-top: 50px;
            padding: 15px 45px;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: 0.4s;
            display: inline-block;
            background: rgba(16, 185, 129, 0.05);
            font-weight: bold;
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.4);
        }

        .ticker-wrap {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(2, 6, 23, 0.95);
            border-top: 1px solid var(--accent);
            padding: 10px 0;
            z-index: 20;
        }

        .ticker { display: flex; white-space: nowrap; animation: scroll 35s linear infinite; }
        .ticker-item { padding: 0 50px; color: var(--accent); font-size: 0.75rem; }

        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="radar-bg">
    <div class="radar-sweep"></div>
    <div class="blip" style="top: 20%; left: 30%;"></div>
    <div class="blip" style="top: 60%; left: 70%; animation-delay: 1s;"></div>
    <div class="blip" style="top: 40%; left: 10%; animation-delay: 2.5s;"></div>
</div>

<div class="personnel-badge">
    ACTIVE PERSONNEL: <span id="member-count">CONNECTING...</span>
</div>

<div class="hero">
    <div style="letter-spacing: 8px; font-size: 0.65rem; color: var(--accent); margin-bottom: 15px;">SATCOM ACTIVE // COALITION LINK SECURE</div>
    <h1>COALITION</h1>
    <a href="https://discord.gg/pdr2BM9f6r" class="btn">ENTER TERMINAL</a>
</div>

<div class="ticker-wrap">
    <div class="ticker">
        <div class="ticker-item">:: [SYSTEM] TACTICAL UPLINK ESTABLISHED ::</div>
        <div class="ticker-item">:: [INTEL] COALITION NEUTRAL ZONE ACTIVE ::</div>
        <div class="ticker-item">:: [STATUS] ENCRYPTION LEVEL: MAXIMUM ::</div>
        <div class="ticker-item">:: [RADAR] SCANNING FOR HOSTILES... ::</div>
    </div>
</div>

<script>
    const serverID = '1485604031240863785'; 

    async function updateMembers() {
        try {
            const response = await fetch(`https://discord.com/api/guilds/${serverID}/widget.json`);
            const data = await response.json();
            document.getElementById('member-count').innerText = data.presence_count;
        } catch (error) {
            document.getElementById('member-count').innerText = "ERROR";
        }
    }

    updateMembers();
    setInterval(updateMembers, 30000);
</script>

</body>
</html>
